<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#74d9d3" />
    <meta name="description" content="건이, 강이, 덩이, 균이 유형을 고르는 건강덩균 TEST" />
    <title>건강덩균 TEST</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/geoni-front.jpeg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="brand-row" aria-hidden="true">
          <span class="book-icon"></span>
          <span class="pencil-icon"></span>
        </div>
        <h1 class="main-title" aria-label="건강덩균 테스트">
          <span class="title-word">
            <span class="title-char title-mint">건</span><span class="title-char title-pink">강</span><span class="title-char title-yellow">덩</span><span class="title-char title-orange">균</span>
          </span>
          <span class="title-test">TEST</span>
        </h1>
        <figure class="hero-character-panel" aria-label="건이, 강이, 균이, 덩이 캐릭터">
          <span class="hero-float-icon hero-float-icon-left" data-icon="sparkles" aria-hidden="true"></span>
          <img src="assets/character-grid.png" alt="건이, 강이, 균이, 덩이 캐릭터 모음" />
          <span class="hero-float-icon hero-float-icon-right" data-icon="heart" aria-hidden="true"></span>
        </figure>
        <p class="hero-copy"><span class="hero-copy-icon" data-icon="sparkles" aria-hidden="true"></span><span>'이건 나야!'라는 생각이 들면 터치해 주세요.</span><span class="hero-copy-icon" data-icon="heart" aria-hidden="true"></span></p>
      </header>

      <section class="status-panel" aria-label="선택 현황">
        <div class="step-summary">
          <span class="status-icon" data-icon="gamepad-2" aria-hidden="true"></span>
          <strong id="currentTypeName">건이</strong>
          <span id="stepCount">1 / 4</span>
        </div>
        <div class="step-tabs" id="stepTabs" aria-label="캐릭터 보드 이동"></div>
        <div class="selected-count">
          <span class="status-icon status-icon-heart" data-icon="heart" aria-hidden="true"></span>
          <span class="count-number" id="selectedCount">0</span>
          <span>개 선택</span>
        </div>
      </section>

      <section class="board" id="board" aria-label="건강덩균 테스트 선택 보드"></section>

      <div class="bottom-bar">
        <button class="ghost-button" type="button" id="resetButton">초기화</button>
        <button class="ghost-button" type="button" id="prevButton">이전</button>
        <button class="result-button" type="button" id="nextButton">다음</button>
      </div>
    </main>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-card" id="resultCard">
        <button class="close-button" type="button" id="closeDialog" aria-label="결과 닫기"><span data-icon="x" aria-hidden="true"></span></button>
        <div class="result-mascots" id="resultMascots" aria-hidden="true"></div>
        <p class="result-kicker"><span data-icon="trophy" aria-hidden="true"></span><span>건강덩균 TEST 결과</span></p>
        <h2 id="resultTitle"></h2>
        <div class="dialog-actions">
          <button class="ghost-button" type="button" id="keepChoosingButton">계속 고르기</button>
          <button class="result-button" type="button" id="restartButton">다시 하기</button>
        </div>
      </div>
    </dialog>

    <template id="typeCardTemplate">
      <article class="type-card">
        <div class="type-board"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
