<!doctype html>
<html lang="ko" data-offline-bundle="true">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#74d9d3" />
    <meta name="description" content="건이, 강이, 덩이, 균이 유형을 고르는 건강덩균 TEST" />
    <title>건강덩균 TEST</title>
    <style>
:root {
  --bg: #f7fbfa;
  --ink: #223536;
  --muted: #657576;
  --line: #cdd9d9;
  --panel: #ffffff;
  --teal: #70d8d2;
  --teal-dark: #229a9b;
  --pink: #ffc9d7;
  --pink-dark: #ce6484;
  --yellow: #ffb531;
  --yellow-dark: #c87800;
  --orange: #ff5125;
  --orange-dark: #b83a22;
  --shadow: 0 18px 50px rgba(30, 61, 62, 0.14);
  --hand-font:
    "Nanum Pen Script",
    "Nanum Brush Script",
    "BM Kirang Haerang",
    "Apple SD Gothic Neo",
    "Malgun Gothic",
    cursive;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--ink);
  font-family:
    ui-rounded,
    "Apple SD Gothic Neo",
    "Malgun Gothic",
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
  line-height: 1.45;
  background:
    radial-gradient(circle at 0 38%, rgba(112, 216, 210, 0.2) 0 8rem, transparent 8.1rem),
    linear-gradient(180deg, #ffffff 0%, #f5fbfa 44%, #e9f7f6 100%);
}

button {
  font: inherit;
}

.app {
  width: min(100%, 1120px);
  margin: 0 auto;
  padding: 22px 18px 112px;
}

.hero {
  position: relative;
  padding: 12px 0 16px;
  text-align: center;
}

.brand-row {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.book-icon {
  position: absolute;
  top: 0;
  left: clamp(0px, 6vw, 64px);
  width: 54px;
  height: 72px;
  rotate: -28deg;
  border-radius: 8px 8px 4px 4px;
  background: #24b3a7;
  box-shadow:
    inset 8px 0 0 #ff6b3c,
    0 5px 0 rgba(31, 57, 58, 0.12);
}

.book-icon::before {
  position: absolute;
  content: "";
  inset: 9px 11px 33px 17px;
  border-radius: 2px;
  background: #ffe35e;
}

.pencil-icon {
  position: absolute;
  top: 84px;
  right: clamp(0px, 7vw, 70px);
  width: 18px;
  height: 84px;
  rotate: 34deg;
  border-radius: 8px;
  background: linear-gradient(90deg, #f8c94f 0 62%, #ffd970 62% 100%);
  box-shadow: 0 3px 0 rgba(31, 57, 58, 0.12);
}

.pencil-icon::before {
  position: absolute;
  content: "";
  top: -10px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 4px 4px 0 0;
  background: #d06d55;
}

.pencil-icon::after {
  position: absolute;
  content: "";
  bottom: -12px;
  left: 1px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 14px solid #edd4a2;
}

.main-title {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: baseline;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0 0.16em;
  margin: 0;
  font-family:
    ui-rounded,
    "Apple SD Gothic Neo",
    "Malgun Gothic",
    system-ui,
    sans-serif;
  font-size: clamp(3rem, 8.6vw, 5.8rem);
  font-weight: 1000;
  letter-spacing: 0;
  line-height: 0.9;
  filter: drop-shadow(0 4px 0 rgba(33, 46, 47, 0.13));
}

.title-word {
  display: inline-flex;
  align-items: baseline;
  gap: 0.02em;
}

.title-char,
.title-test {
  display: inline-block;
  -webkit-text-stroke: 1px rgba(255, 255, 255, 0.82);
  paint-order: stroke fill;
  text-shadow:
    0 7px 0 #d6d6d6,
    0 9px 0 rgba(28, 50, 51, 0.15),
    2px 0 0 rgba(255, 255, 255, 0.75),
    -2px 0 0 rgba(255, 255, 255, 0.75);
}

.title-char:nth-child(1) {
  transform: rotate(-3deg) translateY(0.02em);
}

.title-char:nth-child(2) {
  transform: rotate(3deg) translateY(0.05em);
}

.title-char:nth-child(3) {
  transform: rotate(-1deg);
}

.title-char:nth-child(4) {
  transform: rotate(2deg) translateY(0.02em);
}

.title-mint {
  color: var(--teal);
}

.title-pink {
  color: var(--pink);
}

.title-yellow {
  color: var(--yellow);
}

.title-orange {
  color: var(--orange);
}

.title-test {
  margin-left: 0.16em;
  color: #274143;
  letter-spacing: 0.02em;
}

.hero-copy {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  max-width: min(100%, 780px);
  min-height: 44px;
  margin: 18px auto 0;
  padding: 7px 22px;
  border-radius: 999px;
  color: #143233;
  background: rgba(116, 217, 211, 0.75);
  font-size: clamp(1.05rem, 3.2vw, 1.55rem);
  font-weight: 900;
}

.status-panel {
  position: sticky;
  z-index: 10;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 2px 0 18px;
  padding: 10px 12px;
  border: 1px solid rgba(34, 154, 155, 0.2);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: 0 8px 20px rgba(24, 59, 61, 0.08);
  backdrop-filter: blur(10px);
}

.step-summary {
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: max-content;
  color: #243f40;
  font-weight: 950;
}

.step-summary strong {
  color: var(--teal-dark);
  font-family: var(--hand-font);
  font-size: 1.45rem;
  letter-spacing: 0;
  line-height: 1;
}

.step-summary span {
  color: var(--muted);
  font-size: 0.9rem;
}

.step-tabs {
  display: flex;
  justify-content: center;
  flex: 1;
  gap: 7px;
}

.step-tab {
  position: relative;
  min-width: 58px;
  min-height: 34px;
  padding: 5px 12px;
  border: 1px solid color-mix(in srgb, var(--tab-color) 48%, white);
  border-radius: 999px;
  color: var(--tab-dark);
  background: color-mix(in srgb, var(--tab-color) 16%, white);
  font-family: var(--hand-font);
  font-size: 1.12rem;
  font-weight: 950;
  letter-spacing: 0;
  line-height: 1;
  cursor: pointer;
}

.step-tab.is-current {
  color: #fff;
  background: var(--tab-dark);
  border-color: var(--tab-dark);
}

.step-tab.has-selection::after {
  position: absolute;
  top: -5px;
  right: -3px;
  display: grid;
  place-items: center;
  width: 17px;
  height: 17px;
  border: 2px solid #fff;
  border-radius: 50%;
  color: #fff;
  background: var(--tab-dark);
  content: "✓";
  font-size: 0.72rem;
  font-family: system-ui, sans-serif;
  font-weight: 1000;
}

.selected-count {
  display: flex;
  align-items: center;
  gap: 5px;
  min-width: max-content;
  font-size: 0.98rem;
  font-weight: 850;
}

.count-number {
  display: inline-grid;
  place-items: center;
  min-width: 34px;
  height: 34px;
  border-radius: 50%;
  color: #fff;
  background: #284547;
  font-size: 1.1rem;
}

.board {
  display: grid;
  width: min(100%, 760px);
  margin: 0 auto;
}

.type-card {
  --type-color: var(--teal);
  --type-dark: var(--teal-dark);
  padding: 10px;
  border: 3px dashed var(--type-dark);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 10px 28px rgba(26, 68, 70, 0.08);
}

.type-card[hidden] {
  display: none;
}

.type-board {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border-radius: 16px;
  overflow: hidden;
  background: var(--panel);
}

.tile {
  position: relative;
  display: grid;
  place-items: center;
  width: 100%;
  min-height: clamp(116px, 12vw, 142px);
  padding: 10px 8px;
  border: 0;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  color: #1e3031;
  background: #fff;
  font-family: var(--hand-font);
  font-size: clamp(1.42rem, 3.4vw, 1.86rem);
  font-weight: 900;
  line-height: 1.18;
  letter-spacing: 0;
  word-break: keep-all;
  overflow-wrap: anywhere;
  white-space: pre-line;
  text-align: center;
  -webkit-font-smoothing: antialiased;
  -webkit-text-stroke: 0.2px currentColor;
  text-shadow:
    0.4px 0 currentColor,
    0 0.4px currentColor;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition:
    background 150ms ease,
    color 150ms ease,
    box-shadow 150ms ease,
    transform 150ms ease;
}

.tile:nth-child(3n) {
  border-right: 0;
}

.tile:nth-last-child(-n + 3) {
  border-bottom: 0;
}

.tile:hover {
  background: color-mix(in srgb, var(--type-color) 14%, white);
}

.tile:focus-visible {
  z-index: 2;
  outline: 4px solid color-mix(in srgb, var(--type-color) 60%, white);
  outline-offset: -4px;
}

.tile.is-selected {
  color: var(--type-dark);
  background: color-mix(in srgb, var(--type-color) 28%, white);
  box-shadow: inset 0 0 0 3px color-mix(in srgb, var(--type-color) 72%, white);
}

.tile.is-selected::after {
  position: absolute;
  top: 8px;
  right: 8px;
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  color: #fff;
  background: var(--type-dark);
  content: "✓";
  font-size: 1rem;
  font-weight: 1000;
  transform: rotate(-8deg);
}

.tile.pop {
  animation: pop 220ms ease-out;
}

@keyframes pop {
  0% {
    transform: scale(1);
  }

  54% {
    transform: scale(0.96);
  }

  100% {
    transform: scale(1);
  }
}

.center-tile {
  position: relative;
  display: grid;
  place-items: center;
  min-height: clamp(116px, 12vw, 142px);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: var(--type-color);
  overflow: hidden;
}

.center-label {
  position: relative;
  z-index: 2;
  color: #172829;
  font-family: var(--hand-font);
  font-size: clamp(2.75rem, 5.8vw, 4.4rem);
  font-weight: 1000;
  letter-spacing: 0;
  line-height: 1;
  text-shadow: 0 2px 0 rgba(255, 255, 255, 0.45);
  transform: rotate(-2deg);
}

.center-character {
  position: absolute;
  left: 50%;
  bottom: -8px;
  width: min(82%, 116px);
  max-height: 120px;
  opacity: 0.18;
  object-fit: contain;
  transform: translateX(-50%);
  mix-blend-mode: multiply;
}


.bottom-bar {
  position: fixed;
  z-index: 20;
  left: 50%;
  bottom: 16px;
  display: flex;
  width: min(calc(100% - 28px), 560px);
  gap: 10px;
  padding: 10px;
  border: 1px solid rgba(34, 154, 155, 0.2);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
  transform: translateX(-50%);
  backdrop-filter: blur(14px);
}

.ghost-button,
.result-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 50px;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 950;
  letter-spacing: 0;
  cursor: pointer;
}

.ghost-button:disabled,
.result-button:disabled {
  cursor: default;
  opacity: 0.5;
}

.ghost-button {
  flex: 0 0 94px;
  border: 1px solid #bed1d1;
  color: #32494a;
  background: #fff;
}

.result-button {
  flex: 1;
  border: 0;
  color: #fff;
  background: #273f41;
  box-shadow: 0 10px 22px rgba(28, 62, 64, 0.22);
}

.result-dialog {
  width: min(calc(100% - 28px), 560px);
  padding: 0;
  border: 0;
  border-radius: 18px;
  background: transparent;
  overflow: visible;
}

.result-dialog::backdrop {
  background: rgba(17, 34, 35, 0.48);
  backdrop-filter: blur(4px);
}

.result-card {
  position: relative;
  padding: 34px 22px 22px;
  border-radius: 18px;
  color: #203839;
  background: #fff;
  box-shadow: var(--shadow);
  text-align: center;
}

.close-button {
  position: absolute;
  top: 10px;
  right: 10px;
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 50%;
  color: #33494a;
  background: #eef5f4;
  font-size: 1.65rem;
  line-height: 1;
  cursor: pointer;
}

.result-mascots {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 12px;
  min-height: 210px;
  margin: 0 0 16px;
}

.result-character {
  display: grid;
  justify-items: center;
  gap: 8px;
  margin: 0;
  flex: 0 0 auto;
  transform-origin: center bottom;
  animation: mascotRise 360ms ease-out both;
}

.result-character img {
  width: clamp(128px, 34vw, 188px);
  height: clamp(178px, 44vw, 248px);
  object-fit: contain;
  filter: drop-shadow(0 16px 18px rgba(35, 54, 55, 0.16));
}

.result-character figcaption {
  min-width: 70px;
  padding: 4px 12px 6px;
  border-radius: 999px;
  color: var(--type-dark);
  background: color-mix(in srgb, var(--type-color) 22%, white);
  font-family: var(--hand-font);
  font-size: 1.45rem;
  font-weight: 1000;
  line-height: 1;
}

.result-character:nth-child(2) {
  animation-delay: 70ms;
}

.result-character:nth-child(3) {
  animation-delay: 130ms;
}

.result-character:nth-child(4) {
  animation-delay: 190ms;
}

@keyframes mascotRise {
  from {
    opacity: 0;
    transform: translateY(14px) scale(0.88);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.result-kicker {
  margin: 0 0 6px;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 900;
}

.result-card h2 {
  margin: 0;
  color: var(--type-dark);
  font-family: var(--hand-font);
  font-size: clamp(1.9rem, 6vw, 3rem);
  font-weight: 1000;
  letter-spacing: 0;
  line-height: 1.1;
}

.dialog-actions {
  display: flex;
  gap: 10px;
}

.dialog-actions .ghost-button,
.dialog-actions .result-button {
  flex: 1 1 0;
  min-width: 0;
  white-space: nowrap;
}

@media (max-width: 840px) {
  .app {
    padding-inline: 14px;
  }

  .board {
    width: min(100%, 680px);
  }

  .type-card {
    border-radius: 20px;
  }

  .tile,
  .center-tile {
    min-height: 124px;
  }
}

@media (max-width: 560px) {
  .app {
    padding-top: 12px;
  }

  .main-title {
    font-size: clamp(2.55rem, 11vw, 3.2rem);
  }

  .book-icon {
    display: none;
  }

  .pencil-icon {
    display: none;
  }

  .hero-copy {
    width: 100%;
    padding-inline: 14px;
  }

  .status-panel {
    align-items: flex-start;
    flex-direction: column;
  }

  .step-tabs {
    justify-content: flex-start;
    width: 100%;
    overflow-x: auto;
    padding: 2px 0 4px;
  }

  .type-card {
    padding: 7px;
    border-width: 2px;
  }

  .tile,
  .center-tile {
    min-height: 122px;
  }

  .tile {
    padding: 8px 4px;
    font-size: clamp(1.28rem, 5.2vw, 1.48rem);
    line-height: 1.13;
  }

  .center-label {
    font-size: 2.75rem;
  }

  .bottom-bar {
    bottom: 10px;
    width: min(calc(100% - 20px), 560px);
  }

  .ghost-button {
    flex-basis: 76px;
    font-size: 0.94rem;
  }
}

</style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="brand-row" aria-hidden="true">
          <span class="book-icon"></span>
          <span class="pencil-icon"></span>
        </div>
        <h1 class="main-title" aria-label="건강덩균 테스트">
          <span class="title-word">
            <span class="title-char title-mint">건</span><span class="title-char title-pink">강</span><span class="title-char title-yellow">덩</span><span class="title-char title-orange">균</span>
          </span>
          <span class="title-test">TEST</span>
        </h1>
        <p class="hero-copy">'이건 나야!'라는 생각이 들면 터치해 주세요.</p>
      </header>

      <section class="status-panel" aria-label="선택 현황">
        <div class="step-summary">
          <strong id="currentTypeName">건이</strong>
          <span id="stepCount">1 / 4</span>
        </div>
        <div class="step-tabs" id="stepTabs" aria-label="캐릭터 보드 이동"></div>
        <div class="selected-count">
          <span class="count-number" id="selectedCount">0</span>
          <span>개 선택</span>
        </div>
      </section>

      <section class="board" id="board" aria-label="건강덩균 테스트 선택 보드"></section>

      <div class="bottom-bar">
        <button class="ghost-button" type="button" id="resetButton">초기화</button>
        <button class="ghost-button" type="button" id="prevButton">이전</button>
        <button class="result-button" type="button" id="nextButton">다음</button>
      </div>
    </main>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-card" id="resultCard">
        <button class="close-button" type="button" id="closeDialog" aria-label="결과 닫기">×</button>
        <div class="result-mascots" id="resultMascots" aria-hidden="true"></div>
        <p class="result-kicker">건강덩균 TEST 결과</p>
        <h2 id="resultTitle"></h2>
        <div class="dialog-actions">
          <button class="ghost-button" type="button" id="keepChoosingButton">계속 고르기</button>
          <button class="result-button" type="button" id="restartButton">다시 하기</button>
        </div>
      </div>
    </dialog>

    <template id="typeCardTemplate">
      <article class="type-card">
        <div class="type-board"></div>
      </article>
    </template>

    <script>
const TYPES = [
  {
    id: "geoni",
    name: "건이",

const selected = new Set();
let currentIndex = 0;

const board = document.querySelector("#board");
const currentTypeName = document.querySelector("#currentTypeName");
const stepCount = document.querySelector("#stepCount");
const stepTabs = document.querySelector("#stepTabs");
const selectedCount = document.querySelector("#selectedCount");
const nextButton = document.querySelector("#nextButton");
const prevButton = document.querySelector("#prevButton");
const resetButton = document.querySelector("#resetButton");
const resultDialog = document.querySelector("#resultDialog");
const resultCard = document.querySelector("#resultCard");
const closeDialog = document.querySelector("#closeDialog");
const keepChoosingButton = document.querySelector("#keepChoosingButton");
const restartButton = document.querySelector("#restartButton");
const resultTitle = document.querySelector("#resultTitle");
const resultMascots = document.querySelector("#resultMascots");
const cardTemplate = document.querySelector("#typeCardTemplate");

const gridOrder = [0, 1, 2, 3, "center", 4, 5, 6, 7];

function renderStepTabs() {
  stepTabs.innerHTML = "";

  TYPES.forEach((type, index) => {
    const tab = document.createElement("button");
    tab.className = "step-tab";
    tab.type = "button";
    tab.textContent = type.name;
    tab.style.setProperty("--tab-color", type.color);
    tab.style.setProperty("--tab-dark", type.dark);
    tab.addEventListener("click", () => setCurrentIndex(index, true));
    stepTabs.append(tab);
  });
}

function renderBoard() {
  TYPES.forEach((type, typeIndex) => {
    const card = cardTemplate.content.firstElementChild.cloneNode(true);
    const typeBoard = card.querySelector(".type-board");

    card.dataset.type = type.id;
    card.style.setProperty("--type-color", type.color);
    card.style.setProperty("--type-dark", type.dark);
    card.hidden = typeIndex !== currentIndex;

    gridOrder.forEach((entry, index) => {
      if (entry === "center") {
        const center = document.createElement("div");
        center.className = "center-tile";
        center.style.gridColumn = `${(index % 3) + 1}`;
        center.style.gridRow = `${Math.floor(index / 3) + 1}`;

        const image = document.createElement("img");
        image.className = "center-character";
        image.src = type.image;
        image.alt = "";
        center.append(image);

        const label = document.createElement("span");
        label.className = "center-label";
        label.textContent = type.name;
        center.append(label);
        typeBoard.append(center);
        return;
      }

      const itemId = `${type.id}-${entry}`;
      const tile = document.createElement("button");
      tile.className = "tile";
      tile.type = "button";
      tile.dataset.type = type.id;
      tile.dataset.itemId = itemId;
      tile.style.gridColumn = `${(index % 3) + 1}`;
      tile.style.gridRow = `${Math.floor(index / 3) + 1}`;
      tile.textContent = type.items[entry];
      tile.setAttribute("aria-pressed", "false");
      tile.addEventListener("click", () => toggleTile(tile));
      typeBoard.append(tile);
    });

    board.append(card);
  });
}

function toggleTile(tile) {
  const itemId = tile.dataset.itemId;

  if (selected.has(itemId)) {
    selected.delete(itemId);
    tile.classList.remove("is-selected");
    tile.setAttribute("aria-pressed", "false");
  } else {
    selected.add(itemId);
    tile.classList.add("is-selected", "pop");
    tile.setAttribute("aria-pressed", "true");
    window.setTimeout(() => tile.classList.remove("pop"), 240);
  }

  updateStatus();
}

function getScores() {
  return TYPES.map((type) => ({
    ...type,
    score: Array.from(selected).filter((itemId) => itemId.startsWith(`${type.id}-`)).length,
  }));
}

function hasTypeSelection(type) {
  return Array.from(selected).some((itemId) => itemId.startsWith(`${type.id}-`));
}

function setCurrentIndex(index, shouldScroll = false) {
  currentIndex = Math.max(0, Math.min(index, TYPES.length - 1));

  document.querySelectorAll(".type-card").forEach((card, cardIndex) => {
    card.hidden = cardIndex !== currentIndex;
  });

  updateStatus();

  if (shouldScroll) {
    board.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function updateStatus() {
  const currentType = TYPES[currentIndex];

  currentTypeName.textContent = currentType.name;
  currentTypeName.style.color = currentType.dark;
  stepCount.textContent = `${currentIndex + 1} / ${TYPES.length}`;
  selectedCount.textContent = selected.size;
  prevButton.disabled = currentIndex === 0;

  document.querySelectorAll(".step-tab").forEach((tab, index) => {
    const type = TYPES[index];
    const isCurrent = index === currentIndex;
    tab.classList.toggle("is-current", isCurrent);
    tab.classList.toggle("has-selection", hasTypeSelection(type));
    tab.setAttribute("aria-current", isCurrent ? "step" : "false");
  });

  if (currentIndex === TYPES.length - 1) {
    nextButton.textContent = selected.size === 0 ? "문장 선택 후 결과 보기" : "결과 보기";
    nextButton.disabled = selected.size === 0;
  } else {
    nextButton.textContent = "다음";
    nextButton.disabled = false;
  }
}

function showResult() {
  if (selected.size === 0) {
    nextButton.animate(
      [
        { transform: "translateX(0)" },
        { transform: "translateX(-5px)" },
        { transform: "translateX(5px)" },
        { transform: "translateX(0)" },
      ],
      { duration: 220, easing: "ease-out" },
    );
    return;
  }

  const scores = getScores();
  const maxScore = Math.max(...scores.map((type) => type.score));
  const winners = scores.filter((type) => type.score === maxScore);

  resultMascots.innerHTML = "";
  winners.forEach((type) => resultMascots.append(createResultCharacter(type)));

  resultCard.style.setProperty("--type-color", winners[0].color);
  resultCard.style.setProperty("--type-dark", winners[0].dark);
  resultTitle.textContent = winners.map((type) => type.name).join(" + ");
  resultDialog.showModal();
}

function createResultCharacter(type) {
  const figure = document.createElement("figure");
  figure.className = "result-character";
  figure.style.setProperty("--type-color", type.color);
  figure.style.setProperty("--type-dark", type.dark);

  const image = document.createElement("img");
  image.src = type.image;
  image.alt = type.name;
  image.loading = "eager";
  figure.append(image);

  const caption = document.createElement("figcaption");
  caption.textContent = type.name;
  figure.append(caption);

  return figure;
}

function resetSelections() {
  selected.clear();
  document.querySelectorAll(".tile.is-selected").forEach((tile) => {
    tile.classList.remove("is-selected");
    tile.setAttribute("aria-pressed", "false");
  });
  updateStatus();
}

function registerServiceWorker() {
  const canUseServiceWorker = "serviceWorker" in navigator;
  const isWebPage = ["http:", "https:"].includes(window.location.protocol);
  const isOfflineBundle = document.documentElement.dataset.offlineBundle === "true";

  if (!canUseServiceWorker || !isWebPage || isOfflineBundle) return;

  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

renderStepTabs();
renderBoard();
updateStatus();
registerServiceWorker();

nextButton.addEventListener("click", () => {
  if (currentIndex === TYPES.length - 1) {
    showResult();
    return;
  }

  setCurrentIndex(currentIndex + 1, true);
});

prevButton.addEventListener("click", () => setCurrentIndex(currentIndex - 1, true));
resetButton.addEventListener("click", resetSelections);
closeDialog.addEventListener("click", () => resultDialog.close());
keepChoosingButton.addEventListener("click", () => resultDialog.close());
restartButton.addEventListener("click", () => {
  resultDialog.close();
  resetSelections();
  setCurrentIndex(0, false);
  window.scrollTo({ top: 0, behavior: "smooth" });
});

resultDialog.addEventListener("click", (event) => {
  if (event.target === resultDialog) {
    resultDialog.close();
  }
});

</script>
  </body>
</html>
